name: Backend Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Python
        run: |
          which python
          python --version
          pip --version

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: pytest