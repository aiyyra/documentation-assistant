name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Verify docker
        run: docker ps

      - name: Deploy Application
        run: |
          docker compose down
          docker compose up -d --build
          docker image prune -f