name: Deploy App

on:
  workflow_run:
    workflows: ["Backend Tests"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Verify docker
        run: docker ps

      - name: Deploy Application
        run: |
          docker compose down
          docker compose up -d --build
          docker image prune -f